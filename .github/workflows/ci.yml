name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'

    steps:
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e

            cd /root/frontend-nova-rio

            echo "Pulling latest changes..."
            git pull origin develop

            echo "Starting containers..."
            docker compose -p nova-rio-frontend --env-file .env.production -f docker-compose.production.yml up --build -d

            echo "Deploy completed!"

name: Deploy

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e

            cd /root/frontend-nova-rio

            echo "Pulling latest changes..."
            git pull origin develop

            echo "Starting containers..."
            docker compose -p nova-rio-frontend --env-file .env.production -f docker-compose.production.yml up --build -d

            echo "Deploy completed!"

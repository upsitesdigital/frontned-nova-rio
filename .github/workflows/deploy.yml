name: CI/CD

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" '
            set -e

            if [ ! -d "/root/frontend-nova-rio" ]; then
              echo "📥 Clonando repositório..."
              git clone https://github.com/upsitesdigital/frontned-nova-rio.git /root/frontend-nova-rio
            fi

            cd /root/frontend-nova-rio

            echo "📥 Atualizando código..."
            git pull origin develop

            echo "🐳 Subindo containers..."
            docker compose -p nova-rio-frontend --env-file .env.production -f docker-compose.production.yml up --build -d

            echo "✅ Deploy concluído!"
          '

name: CI/CD

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'

    steps:
      - name: Preparar chave SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e

            if [ ! -d "/root/frontend-nova-rio" ]; then
              echo "📥 Clonando repositório..."
              git clone https://github.com/upsitesdigital/frontned-nova-rio.git /root/frontend-nova-rio
            fi

            cd /root/frontend-nova-rio

            echo "📥 Atualizando código..."
            git pull origin develop

            echo "🐳 Subindo containers..."
            docker compose -p nova-rio-frontend --env-file .env.production -f docker-compose.production.yml up --build -d

            echo "✅ Deploy concluído!"
